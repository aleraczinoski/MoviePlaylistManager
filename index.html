<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist de Filmes</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="modal.css" />
  </head>
  <body>
    <header>
      <h1><i class="bi bi-film"></i>Playlist de Filmes</h1>
      <section id="search-container">
        <div class="input-wrapper movie-name-wrapper">
          <label for="movie-name">Nome:</label>
          <input type="text" id="movie-name" />
        </div>
        <div class="input-wrapper movie-year-wrapper">
          <label for="movie-year">Ano:</label>
          <input type="number" id="movie-year" />
        </div>
        <button id="search-button"><i class="bi bi-search"></i></button>
      </section>
    </header>
    <main>
      <h2>Comece agora a sua lista de filmes</h2>
      <section id="movie-list"></section>
      <article id="modal-overlay" class="overlay">
        <section id="modal-background"></section>
        <section id="modal-container">
          <h2 id="movie-title">The Impossible - 2012</h2>
          <section id="modal-body">
            <img
              id="movie-poster"
              src="https://m.media-amazon.com/images/M/MV5BZjM1ZTJkMjctY2M0ZC00ZTkyLTliYTktNzYxYWIzYTAyOTRjXkEyXkFqcGc@._V1_SX300.jpg"
              alt="Poster do filme"
            />
            <div id="movie-info">
              <h3 id="movie-plot">
                The story of a tourist family in Thailand caught in the
                destruction and chaotic aftermath of the 2004 Indian Ocean
                tsunami.
              </h3>
              <div id="movie-cast">
                <h4>Elenco:</h4>
                <h5>Naomi Watts, Ewan McGregor, Tom Holland</h5>
              </div>
              <div id="movie-genre">
                <h4>Gênero:</h4>
                <h5>Drama, History, Thriller</h5>
              </div>
            </div>
          </section>
          <section id="modal-footer">
            <button id="add-to-list">Adicionar à lista</button>
          </section>
        </section>
      </article>
    </main>
    <script src="modal.js"></script>
    <script src="script.js"></script>
  </body>
</html>
